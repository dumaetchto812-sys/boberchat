<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bober Chat</title>
    <script src="https://cdn.socket.io/4.5.0/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: background 0.25s ease, color 0.2s ease, border-color 0.2s, box-shadow 0.2s;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at 20% 30%, #1a1a2e, #16213e);
            padding: 16px;
        }

        .app-wrapper {
            display: flex;
            gap: 16px;
            max-width: 900px;
            width: 100%;
            align-items: flex-start;
        }

        /* ===== БОКОВАЯ ПАНЕЛЬ ===== */
        .sidebar {
            flex: 0 0 200px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 20px 14px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            max-height: 600px;
            overflow-y: auto;
        }
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .sidebar-title {
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            padding-left: 6px;
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 16px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
            transition: 0.2s;
            color: rgba(255,255,255,0.7);
        }
        .chat-item:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }
        .chat-item.active {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }
        .chat-item i {
            font-size: 1.1rem;
            width: 24px;
            text-align: center;
        }
        .chat-item .chat-name {
            font-weight: 500;
            font-size: 0.9rem;
        }
        .chat-item .chat-badge {
            margin-left: auto;
            background: rgba(255, 215, 0, 0.2);
            color: #f7d794;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        /* Звонки в боковой панели */
        .call-section {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        #onlineUsers {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .online-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: 10px;
            background: rgba(255,255,255,0.03);
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
        }
        .online-user .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #00ff88;
            margin-left: auto;
            flex-shrink: 0;
        }
        .online-user .user-avatar {
            font-size: 1.2rem;
        }

        #callStatus {
            display: none;
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(255,200,0,0.1);
            border-radius: 12px;
            text-align: center;
            color: #ffd93d;
            font-size: 0.8rem;
        }
        #callStatus.active {
            display: block;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* ===== ОСНОВНОЙ ЧАТ ===== */
        .chat-app {
            flex: 1;
            min-width: 0;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 48px 48px 32px 32px;
            padding: 24px 24px 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            background-image: linear-gradient(135deg, rgba(255, 215, 0, 0.05), rgba(255, 100, 200, 0.05), rgba(0, 200, 255, 0.05));
            background-size: 300% 300%;
            animation: shimmer 8s ease-in-out infinite alternate;
        }

        @keyframes shimmer {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 1.3rem;
            letter-spacing: 0.5px;
            color: #fff;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            transition: color 0.3s;
        }
        .brand i { font-size: 1.6rem; }
        .brand span { transition: color 0.3s; }

        .theme-toggles {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            background: rgba(0, 0, 0, 0.2);
            padding: 4px 8px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .theme-btn {
            background: transparent;
            border: none;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: 0.2s;
            white-space: nowrap;
        }
        .theme-btn i { font-size: 0.8rem; }
        .theme-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .theme-btn.active-light {
            background: rgba(255, 255, 255, 0.2);
            color: #111;
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.3);
        }
        .theme-btn.active-dark {
            background: rgba(0, 0, 0, 0.4);
            color: #f0f0f0;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.4);
        }
        .theme-btn.active-red {
            background: rgba(255, 0, 0, 0.2);
            color: #ffdddd;
            box-shadow: 0 0 12px rgba(255, 0, 0, 0.3);
        }
        .theme-btn.active-blue {
            background: rgba(0, 100, 255, 0.2);
            color: #ddeeff;
            box-shadow: 0 0 12px rgba(0, 100, 255, 0.3);
        }
        .theme-btn.active-green {
            background: rgba(0, 200, 100, 0.2);
            color: #ddffdd;
            box-shadow: 0 0 12px rgba(0, 200, 100, 0.3);
        }
        .theme-btn.active-purple {
            background: rgba(180, 0, 255, 0.2);
            color: #f0ddff;
            box-shadow: 0 0 12px rgba(180, 0, 255, 0.3);
        }

        .profile-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px 4px 6px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        .avatar-wrapper {
            position: relative;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: linear-gradient(135deg, #f093fb, #f5576c);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
            text-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-wrapper .avatar-emoji {
            font-size: 1.3rem;
            line-height: 1;
        }
        .avatar-wrapper .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.2s;
            border-radius: 50%;
            color: white;
            font-size: 0.6rem;
            font-weight: 600;
        }
        .avatar-wrapper:hover .avatar-overlay {
            opacity: 1;
        }

        .nick-wrapper {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        #nickDisplay {
            font-weight: 600;
            font-size: 0.9rem;
            color: #fff;
            background: transparent;
            border: none;
            max-width: 100px;
            padding: 2px 0;
            border-bottom: 2px solid transparent;
            transition: 0.2s;
        }
        #nickDisplay:focus {
            outline: none;
            border-bottom-color: rgba(255, 255, 255, 0.4);
        }

        .nick-edit-btn {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            padding: 2px 4px;
            border-radius: 30px;
            transition: 0.2s;
            font-size: 0.8rem;
        }
        .nick-edit-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .chat-window {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 16px 16px;
            margin: 14px 0 14px;
            min-height: 300px;
            max-height: 380px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            gap: 8px;
            scroll-behavior: smooth;
        }
        .chat-window::-webkit-scrollbar {
            width: 4px;
        }
        .chat-window::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.1);
            border-radius: 12px;
        }
        .chat-window::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 12px;
        }

        .message {
            padding: 8px 14px;
            border-radius: 20px;
            max-width: 85%;
            word-break: break-word;
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            color: #f0f0f0;
            animation: fadeUp 0.3s ease;
            font-size: 0.9rem;
        }
        .message strong {
            color: #f7d794;
            margin-right: 4px;
        }
        .message .msg-gif, .message .msg-img {
            max-width: 100%;
            border-radius: 14px;
            margin-top: 4px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .message .msg-gif { max-height: 140px; }
        .message .msg-img { max-height: 160px; }
        .message-self {
            align-self: flex-end;
            background: rgba(255, 215, 0, 0.12);
            border: 1px solid rgba(255, 215, 0, 0.15);
        }
        .message-other { align-self: flex-start; }
        .message-call {
            align-self: center;
            background: rgba(255, 200, 0, 0.1);
            border: 1px solid rgba(255, 200, 0, 0.15);
            text-align: center;
            font-size: 0.8rem;
            max-width: 95%;
        }
        .message-call strong {
            color: #ffd93d;
        }

        @keyframes fadeUp {
            0% { opacity: 0; transform: translateY(6px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .input-area {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 4px;
            align-items: center;
        }
        .input-area input[type="text"] {
            flex: 2 1 180px;
            padding: 10px 16px;
            border-radius: 60px;
            border: none;
            background: rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: 0.2s;
            min-width: 120px;
        }
        .input-area input[type="text"]::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }
        .input-area input[type="text"]:focus {
            outline: none;
            border-color: rgba(255, 215, 0, 0.3);
            background: rgba(0, 0, 0, 0.35);
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 60px;
            color: #eee;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.8rem;
            white-space: nowrap;
        }
        .action-btn i { font-size: 0.9rem; }
        .action-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: scale(1.02);
            border-color: rgba(255, 255, 255, 0.15);
        }
        .action-btn.send-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            border: none;
            color: white;
            box-shadow: 0 4px 10px rgba(245, 87, 108, 0.3);
        }
        .action-btn.send-btn:hover {
            transform: scale(1.04);
            box-shadow: 0 6px 16px rgba(245, 87, 108, 0.4);
        }
        .action-btn.call-btn {
            background: rgba(0, 200, 100, 0.15);
            border-color: rgba(0, 200, 100, 0.2);
        }
        .action-btn.call-btn:hover {
            background: rgba(0, 200, 100, 0.25);
        }
        .action-btn.call-btn.active {
            background: rgba(255, 200, 0, 0.25);
            border-color: rgba(255, 200, 0, 0.3);
            animation: pulse 1.5s infinite;
        }
        .action-btn.join-call-btn {
            background: rgba(0, 200, 255, 0.15);
            border-color: rgba(0, 200, 255, 0.2);
            display: none;
        }
        .action-btn.join-call-btn:hover {
            background: rgba(0, 200, 255, 0.25);
        }
        .action-btn.join-call-btn.show {
            display: inline-flex;
        }
        .action-btn.img-btn {
            background: rgba(0, 255, 150, 0.08);
            border-color: rgba(0, 255, 150, 0.12);
        }
        .action-btn.upload-btn {
            background: rgba(255, 200, 0, 0.08);
            border-color: rgba(255, 200, 0, 0.12);
        }
        #fileInput {
            display: none;
        }

        /* ===== МОДАЛ ЗВОНКА ===== */
        .call-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.88);
            backdrop-filter: blur(12px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .call-modal.active {
            display: flex;
        }
        .call-modal video {
            width: 80%;
            max-width: 480px;
            border-radius: 16px;
            background: #000;
            border: 2px solid rgba(255,255,255,0.15);
            margin: 8px;
        }
        .call-modal .call-controls {
            display: flex;
            gap: 16px;
            margin-top: 16px;
        }
        .call-modal .call-controls button {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .call-modal .call-controls .hangup-btn {
            background: #ff4444;
            color: white;
        }
        .call-modal .call-controls .hangup-btn:hover {
            background: #cc0000;
            transform: scale(1.1);
        }
        .call-modal .call-controls .mute-btn {
            background: #444;
            color: white;
        }
        .call-modal .call-controls .mute-btn:hover {
            background: #666;
        }
        .call-modal .call-info {
            color: white;
            font-size: 1.1rem;
            margin-bottom: 16px;
            text-align: center;
        }
        .call-modal .participants-list {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            margin-bottom: 12px;
            text-align: center;
        }
        .call-modal .participants-list span {
            background: rgba(255,255,255,0.08);
            padding: 3px 10px;
            border-radius: 16px;
            margin: 3px;
            display: inline-block;
        }

        /* ===== ТЕМЫ ===== */
        .app-light .sidebar {
            background: rgba(255, 255, 255, 0.5);
            border-color: rgba(0,0,0,0.05);
        }
        .app-light .sidebar-title { color: #555; }
        .app-light .chat-item { color: #333; }
        .app-light .chat-item:hover { background: rgba(0,0,0,0.05); color: #111; }
        .app-light .chat-item.active {
            background: rgba(0,0,0,0.08);
            border-color: rgba(0,0,0,0.1);
            color: #111;
        }
        .app-light .chat-app {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border-color: rgba(255, 255, 255, 0.3);
        }
        .app-light .chat-window {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0, 0, 0, 0.05);
        }
        .app-light .message {
            background: rgba(255, 255, 255, 0.5);
            color: #1a1a1a;
            border-color: rgba(0, 0, 0, 0.04);
        }
        .app-light .message strong { color: #b45f06; }
        .app-light #nickDisplay { color: #111; }
        .app-light .profile-area {
            background: rgba(0, 0, 0, 0.03);
            border-color: rgba(0,0,0,0.05);
        }
        .app-light .input-area input[type="text"] {
            background: rgba(255, 255, 255, 0.5);
            color: #111;
            border-color: rgba(0,0,0,0.05);
        }
        .app-light .input-area input[type="text"]::placeholder { color: #444; }
        .app-light .action-btn {
            color: #222;
            background: rgba(255,255,255,0.4);
            border-color: rgba(0,0,0,0.05);
        }
        .app-light .action-btn.send-btn { color: white; }
        .app-light .theme-btn { color: #222; }
        .app-light .theme-btn.active-light {
            background: rgba(0,0,0,0.08);
            color: #111;
            box-shadow: 0 0 8px rgba(0,0,0,0.08);
        }
        .app-light .nick-edit-btn { color: #333; }
        .app-light .brand { color: #222; }
        .app-light .chat-item .chat-badge { background: rgba(0,0,0,0.08); color: #555; }
        .app-light .online-user { color: #333; }
        .app-light .online-user .status-dot { background: #00aa55; }

        .app-dark .sidebar {
            background: rgba(0, 0, 0, 0.4);
            border-color: rgba(255,255,255,0.05);
        }
        .app-dark .sidebar-title { color: #888; }
        .app-dark .chat-item { color: #ccc; }
        .app-dark .chat-item:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .app-dark .chat-item.active {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.08);
            color: #fff;
        }
        .app-dark .chat-app {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            border-color: rgba(255, 255, 255, 0.05);
        }
        .app
